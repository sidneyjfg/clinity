name: Frontend Release

on:
  release:
    types:
      - published

permissions:
  packages: write

jobs:
  frontend-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/clinity-frontend
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=${{ github.event.release.name }}
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_COMMIT_SHA=${{ github.sha }}
            NEXT_PUBLIC_APP_LAYER_LABEL=${{ github.event.release.tag_name }}

      - name: Upload stack compose artifact
        uses: actions/upload-artifact@v4
        with:
          name: stack-compose-${{ github.event.release.tag_name }}
          path: |
            deploy/docker-compose.stack.yml
            deploy/stack.env.example
            backend/.env.example
